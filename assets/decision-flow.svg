<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1400" viewBox="0 0 1200 1400">
  <style>
    .title { font: 700 24px/1.2 "Segoe UI", Roboto, Arial, sans-serif; fill: #0b1226 }
    .box { fill: #ffffff; stroke: #2b6cb0; stroke-width: 2; rx: 8; }
    .box-alt { fill: #f7fafc; stroke: #718096; stroke-width: 2; rx: 8; }
    .text { font: 600 14px/1.2 "Segoe UI", Roboto, Arial, sans-serif; fill: #0b1226 }
    .small { font: 400 12px/1.2 "Segoe UI", Roboto, Arial, sans-serif; fill: #2d3748 }
    .arrow { stroke: #2d3748; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3748" />
    </marker>
  </defs>

  <text x="40" y="40" class="title">Bluemins WhatsApp Bot — Decision Flow</text>

  <!-- Top actor boxes -->
  <g>
    <rect x="80" y="80" width="220" height="56" class="box" />
    <text x="190" y="115" text-anchor="middle" class="text">User (WhatsApp)</text>

    <rect x="420" y="80" width="260" height="56" class="box" />
    <text x="550" y="115" text-anchor="middle" class="text">Twilio Webhook</text>

    <rect x="780" y="80" width="320" height="56" class="box" />
    <text x="940" y="115" text-anchor="middle" class="text">Express Server (server.js)</text>
  </g>

  <!-- Arrows top row -->
  <path d="M300 108 L420 108" class="arrow" />
  <path d="M680 108 L780 108" class="arrow" />

  <!-- Server -> Agent -->
  <rect x="360" y="180" width="480" height="72" class="box-alt" />
  <text x="600" y="228" text-anchor="middle" class="text">runAgent() (agent.js) — LLM decision + orchestration</text>
  <path d="M940 140 L940 180" class="arrow" />

  <!-- Branch boxes -->
  <!-- ORDER flow column left -->
  <rect x="80" y="300" width="320" height="64" class="box" />
  <text x="240" y="340" text-anchor="middle" class="text">session.flow === "ORDER"</text>

  <rect x="80" y="380" width="320" height="56" class="box-alt" />
  <text x="240" y="415" text-anchor="middle" class="small">extractOrderFields(userText) — LLM extractor</text>

  <rect x="80" y="460" width="320" height="56" class="box" />
  <text x="240" y="495" text-anchor="middle" class="small">mergeDraft & check missing fields</text>

  <rect x="80" y="540" width="320" height="56" class="box-alt" />
  <text x="240" y="575" text-anchor="middle" class="small">If missing → ask next question</text>

  <rect x="80" y="620" width="320" height="64" class="box" />
  <text x="240" y="660" text-anchor="middle" class="small">If complete → createOrderStub() → formatOrderSummary → reply</text>

  <!-- NORMAL flow column right -->
  <rect x="480" y="300" width="560" height="64" class="box" />
  <text x="760" y="340" text-anchor="middle" class="text">Normal mode: planning & intent</text>

  <rect x="480" y="380" width="560" height="56" class="box-alt" />
  <text x="760" y="415" text-anchor="middle" class="small">isWithinBusinessHours() + build system prompt</text>

  <rect x="480" y="460" width="560" height="56" class="box" />
  <text x="760" y="495" text-anchor="middle" class="small">LLM decision call → returns JSON plan</text>

  <rect x="480" y="540" width="560" height="80" class="box-alt" />
  <text x="760" y="580" text-anchor="middle" class="small">Dispatch by plan.intent / flags:</text>
  <text x="760" y="601" text-anchor="middle" class="small">• PRODUCT_INFO → lookupProductInfo() / faq.json</text>
  <text x="760" y="620" text-anchor="middle" class="small">• ORDER/startOrder → set session.flow='ORDER' → extractOrderFields()</text>
  <text x="760" y="639" text-anchor="middle" class="small">• HANDOFF/startHandoff → handoffToHumanStub()</text>
  <text x="760" y="658" text-anchor="middle" class="small">• FAQ → lookupProductInfo1()</text>

  <!-- Arrows from agent to flows -->
  <path d="M600 252 L240 300" class="arrow" />
  <path d="M600 252 L760 300" class="arrow" />

  <!-- Reply / Twilio send -->
  <rect x="260" y="760" width="680" height="64" class="box" />
  <text x="600" y="800" text-anchor="middle" class="text">Server sends reply via Twilio REST API (client.messages.create)</text>

  <!-- Arrows from flow outcomes to reply -->
  <path d="M240 680 L240 760" class="arrow" />
  <path d="M760 760 L760 720 L760 680" class="arrow" />
  <path d="M240 680 L600 760" class="arrow" />

  <!-- Session update and end -->
  <rect x="420" y="860" width="360" height="56" class="box-alt" />
  <text x="600" y="895" text-anchor="middle" class="small">Update sessions[from] = newSession (in-memory)</text>
  <path d="M600 824 L600 860" class="arrow" />

  <text x="40" y="980" class="small">Notes:</text>
  <text x="40" y="1000" class="small">• FAQ checked before generating AI replies; deterministic answers preferred.</text>
  <text x="40" y="1020" class="small">• createOrderStub() and handoffToHumanStub() are stubs; replace with real integrations.</text>
  <text x="40" y="1040" class="small">• Sessions are in-memory; README suggests Redis/Postgres for production.</text>

</svg>
